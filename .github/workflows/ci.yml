name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # apps/frontend's postinstall runs `quasar prepare`, which loads
      # quasar.config.ts. That config now imports `synkos/vite` (the
      # framework helper), so the framework packages must be built before
      # frontend's postinstall executes. Two-step install:
      #   1. install with --ignore-scripts so postinstall doesn't fire
      #   2. build framework packages so their dist/ exists
      #   3. run the previously-skipped postinstall scripts manually
      - name: Install dependencies (skip lifecycle scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build framework packages (so apps/* postinstalls resolve workspace deps)
        run: pnpm --filter ./packages/synkos --filter @synkos/ui --filter @synkos/client build

      - name: Run apps/* postinstall scripts (Capacitor sync, quasar prepare, nuxt prepare)
        run: |
          pnpm --filter frontend run postinstall
          pnpm --filter web run postinstall

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # ── Web (synkos.dev) ────────────────────────────────────────────────────
      # Validates that:
      #   1. The Nuxt site type-checks and builds end-to-end.
      #   2. The committed docs match what `pnpm sync:docs` produces from the
      #      current package source. If they don't, the author forgot to run
      #      sync:docs after editing a component or its JSDoc — block the PR
      #      with a clear message instead of letting the live site go stale.

      - name: Verify docs are in sync with source
        run: |
          pnpm sync:docs
          if ! git diff --quiet -- apps/web/content/en/docs/components apps/web/content/en/docs/api apps/web/assets/generated; then
            echo ""
            echo "::error::Docs are out of sync with package source."
            echo "::error::Run 'pnpm sync:docs' locally and commit the regenerated files."
            echo ""
            echo "Diff of generated files:"
            git --no-pager diff -- apps/web/content/en/docs/components apps/web/content/en/docs/api apps/web/assets/generated
            exit 1
          fi

      - name: Build web (synkos.dev)
        run: pnpm --filter web build
