name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Create Release PR or Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # See ci.yml for why this is split: apps/frontend's postinstall runs
      # `quasar prepare`, which loads a quasar.config.ts that imports
      # `synkos/vite` — so the framework packages must be built first.
      - name: Install dependencies (skip lifecycle scripts)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build framework packages (so apps/* postinstalls resolve workspace deps)
        run: pnpm --filter ./packages/synkos --filter @synkos/ui --filter @synkos/client build

      - name: Run apps/* postinstall scripts
        run: |
          pnpm --filter frontend run postinstall
          pnpm --filter web run postinstall

      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
