name: sync-templates
description: Sync apps/frontend → templates/frontend and push the update

rules:

  when-to-run:
    - after adding or changing any feature in apps/frontend or apps/backend
    - after adding, removing, or updating dependencies in apps/frontend/package.json
    - before publishing a new version of create-synkos

  what-gets-synced:
    - src/                              → full copy, file by file
    - package.json deps/devDeps         → from apps/, workspace:* entries excluded
    - src-capacitor/capacitor.config.json → synced with template var substitution

  what-does-not-get-synced:
    - package.json name/productName     → kept as {{PROJECT_NAME}} / {{APP_NAME}}
    - src-capacitor/ios/                → generated by Capacitor
    - src-capacitor/android/            → generated by Capacitor
    - src-capacitor/www/                → generated by Quasar build
    - pnpm-lock.yaml                    → managed per project

  changeset:
    when: the synced change includes a user-visible fix or feature
    when-not: the change is only in apps/ internals or workspace-only deps
    package: create-synkos
    note: |
      A sync that propagates a bug fix (e.g. missing dependency) needs a patch changeset.
      A sync that adds a new feature to the template needs a minor changeset.

phases:

  - phase: sync
    steps:
      - run: pnpm sync:templates
      - verify: check diff between apps/ and templates/ — only expected differences should remain
        expected-differences:
          - package.json (name, productName, workspace:* deps)
          - src-capacitor/capacitor.config.json (template vars vs real values)
          - pnpm-lock.yaml (only in templates/)
          - src-capacitor/ios/, android/, www/ (generated dirs, only in templates/)

  - phase: pre-commit
    steps:
      - run: git status
      - identify: did any packages/ change? → need changeset?
      - stage: apps/frontend/ and templates/frontend/ changes (specific files, never -A)
      - create changeset if needed (include in same commit)

  - phase: commit
    steps:
      - write message following push-git.yaml format
      - scope: templates or apps/frontend depending on what changed
      - examples:
          sync-only: "chore(templates): sync frontend template from apps/frontend"
          with-feature: "feat(templates): add dark mode to frontend template"
          with-fix: "fix(templates): add missing @capacitor/core dependency"

  - phase: push
    steps:
      - follow push-git.yaml push phase

  decision-tree:
    sync-only-no-user-impact: "commit chore(templates), no changeset"
    sync-with-bug-fix: "commit fix(templates) + changeset patch for create-synkos"
    sync-with-new-feature: "commit feat(templates) + changeset minor for create-synkos"
    deps-added-in-apps: "always sync package.json + check if changeset needed"
