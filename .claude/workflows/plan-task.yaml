name: plan-task
description: Classify a task and orchestrate the appropriate pipeline automatically

phases:

  - phase: classify
    steps:
      - step: identify-scope
        action: |
          Before touching any file, determine:
          - Goal of the task
          - Modules affected (apps/, packages/, templates/)
          - Whether public API changes are involved
          - Whether a changeset will be needed
          - Whether template sync will be needed

      - step: classify-complexity
        action: |
          Assign one of:

          SIMPLE   — 1-3 files, single module, no new public API, no template sync needed
          MEDIO    — multi-file, single package, possible template sync, possible changeset
          COMPLEJO — multi-package, new public API, 10+ files, architectural decision

      - step: risk-assessment
        action: |
          Identify:
          - Breaking changes to existing API consumers
          - Cross-package dependencies that could break
          - Ambiguities that must be clarified before implementation

  # ─────────────────────────────────────

  - phase: pipeline-selection
    steps:
      - step: select-pipeline
        action: |
          Based on classification, select and execute the pipeline:

          SIMPLE:
            → Execute directly
            → Apply post-implementation checklist when done

          MEDIO:
            → Brief impact analysis (list affected files and reason)
            → Execute
            → Apply post-implementation checklist

          COMPLEJO:
            → Spawn `architect` agent — wait for its plan before writing any code
            → Spawn `coder` agent(s) based on architect's plan
               • Spawn multiple coders in parallel if modules are independent
            → Spawn `reviewer` agent — must APPROVE before committing
            → Spawn `tester` agent — must report LISTO PARA COMMIT: SÍ
            → Apply post-implementation checklist

      - step: post-checklist
        action: |
          After ANY implementation, always check (without being asked):
          1. Was apps/frontend/src/ modified? → propose: pnpm sync:templates
          2. Was packages/ modified? → evaluate changeset need (see CLAUDE.md table)
          3. Are there uncommitted changes? → follow push-git workflow

  # ─────────────────────────────────────

  - phase: output
    steps:
      - step: plan-summary
        action: |
          Report before executing:
          - Classification (Simple / Medio / Complejo)
          - Pipeline chosen
          - Agents to spawn (if Complejo), with their inputs
          - Workflows to follow
          - Post-checklist items that will apply
