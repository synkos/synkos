name: push-git
description: Stage, commit, and push changes following Synkos monorepo conventions

rules:

  commit-message:
    format: "<type>(<scope>): <description>"
    types: [feat, fix, chore, docs, style, refactor, test, ci]
    scope: affected package or area — e.g. create-synkos, synkos-server, apps/backend, ci, docs
    description: lowercase, imperative, no period
    body: only if WHY is non-obvious — never describe WHAT
    example: |
      fix(create-synkos): skip .git dirs when bundling templates

  staging:
    - stage specific files, never `git add -A` blindly
    - never stage: .env, *.local, pnpm-lock.yaml (unless lockfile changed intentionally)
    - always check `git status` before staging

  changeset:
    when: any change in packages/ that users will notice (fix, feat, breaking)
    file: .changeset/<descriptive-slug>.md
    bump-rules:
      patch: bug fix, internal refactor, dep update
      minor: new feature, new export, new component
      major: breaking change in public API
    format: |
      ---
      'package-name': patch|minor|major
      ---
      <one-line description for CHANGELOG>
    multi-package: one changeset can cover multiple packages
    commit: include changeset file in the same commit as the code change

    # ── Package impact map ────────────────────────────────────────────────────
    # Run `git diff --name-only` and map every changed path through this table.
    # Collect ALL affected packages first, then write ONE changeset covering them.
    package-impact-map:

      'packages/synkos/**':
        npm-package: synkos
        bump: infer from change type

      'packages/synkos-server/**':
        npm-package: '@synkos/server'
        bump: infer from change type

      'packages/synkos-ui/**':
        npm-package: '@synkos/ui'
        bump: infer from change type

      'packages/synkos-utils/**':
        npm-package: '@synkos/utils'
        bump: infer from change type

      'packages/synkos-runtime/**':
        npm-package: '@synkos/runtime'
        bump: infer from change type

      'packages/synkos-config/**':
        npm-package: '@synkos/config'
        bump: infer from change type

      'packages/create-synkos/src/**':
        npm-package: create-synkos
        bump: infer from change type

      'templates/**':
        npm-package: create-synkos
        bump: patch
        reason: >
          templates/ is bundled into create-synkos at build time (prebuild step).
          Any user-visible change to templates/ requires a create-synkos patch so
          the updated templates are included in the next published version.
        exception: >
          Skip if the only change is internal scaffolding structure that produces
          identical output for the end user (e.g. a .gitignore tweak that was
          already gitignored, or a comment-only change).

      'apps/**':
        npm-package: null
        bump: none — apps/ is never published

      'docs/**':
        npm-package: null
        bump: none

      '.github/**':
        npm-package: null
        bump: none

      'scripts/**':
        npm-package: null
        bump: none

  push:
    - always pull --rebase before push if rejected
    - if unstaged changes block rebase: git stash → rebase → stash pop → push
    - never force push to main
    - after push: CI runs lint + format:check + typecheck + build + test
    - 'after push with changeset: CI creates "chore: version packages" PR → user merges → npm publishes'

  phases:

    - phase: pre-commit
      steps:
        - run: git diff --name-only HEAD (or git status for untracked files)
        - map every changed path through package-impact-map above
        - collect the full list of affected npm packages and their required bump types
        - if any packages require a changeset → create ONE .changeset file listing all of them
        - if package.json deps changed in any package → stage pnpm-lock.yaml too
        - stage: specific files + changeset file (if created)

    - phase: verify
      mandatory: true
      no-exceptions: >
        This phase MUST run before every single commit, regardless of how small or
        trivial the change appears. Docs, cherry-picks, single-line fixes — all of
        them. CI runs the exact same checks; failing to run them locally wastes a
        full CI cycle and blocks the PR.
      steps:
        - run: pnpm format
          note: always run — formats ALL staged files including docs, scripts, configs
        - run: pnpm lint
          note: fix any errors before continuing; do not proceed with lint failures
        - run: pnpm format:check
          note: must exit 0 — if it fails after pnpm format something is wrong, investigate
        - re-stage any files that pnpm format modified
        - BLOCK: do not advance to commit phase until both lint and format:check exit 0

    - phase: commit
      steps:
        - write message following format above
        - use heredoc: git commit -m "$(cat <<'EOF' ... EOF)"

    - phase: push
      steps:
        - git push origin <branch>
        - if rejected: git stash && git pull --rebase origin <branch> && git stash pop && git push
        - confirm push succeeded

  ci-parity:
    description: >
      Local verify phase mirrors CI exactly. CI runs: lint → format:check → typecheck → build → test.
      If verify passes locally, CI passes. If CI fails on something verify passed, the workflow
      is broken — fix the workflow, not just the CI failure.
    common-failures:
      - forgot pnpm format on a docs/config file → always run pnpm format, not just on .ts/.vue
      - pnpm-lock.yaml stale after adding deps → stage lockfile when package.json changes
      - cherry-pick or merge brought in unformatted files → run pnpm format after every cherry-pick

  decision-tree:
    changed-only-apps-or-docs: "commit only, no changeset"
    changed-packages-fix: "commit + changeset patch"
    changed-packages-feature: "commit + changeset minor"
    changed-packages-breaking: "commit + changeset major + warn user"
    changed-templates: "commit + changeset patch for create-synkos"
    changed-packages-and-templates: "commit + one changeset listing all affected packages"
    format-only: "commit style: no changeset"
