name: Bug Report
description: Report a bug or unexpected behavior in the app
labels: [bug, needs-triage]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide the steps to reproduce the behavior.
      placeholder: |
        1. Go to screen '...'
        2. Tap on '...'
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error messages, stack traces, or screenshots if available.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Web
        - iOS
        - Android
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS / Browser Version
      placeholder: e.g. iOS 18.3, Android 15, Chrome 124
    validations:
      required: false

  - type: input
    id: app-version
    attributes:
      label: App Version / Branch
      placeholder: e.g. main, v1.2.0
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, or any other relevant information.
    validations:
      required: false
